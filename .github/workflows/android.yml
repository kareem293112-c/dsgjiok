name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x SadaAlArabAndroid/gradlew

    - name: Check Gradle Wrapper
      run: ls -la SadaAlArabAndroid/gradle/wrapper

    - name: Verify Gradle Wrapper Jar
      run: jar tf SadaAlArabAndroid/gradle/wrapper/gradle-wrapper.jar | grep GradleWrapperMain

    - name: Build with Gradle
      run: cd SadaAlArabAndroid && ./gradlew assembleDebug
